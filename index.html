<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Verifikasi Komitmen PKH - Kecamatan Panggul</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', 'Roboto', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0d4715 0%, #1a6b26 100%);
      min-height: 100vh;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
    }
    
    .header {
      background: linear-gradient(135deg, #0d4715 0%, #1a6b26 100%);
      color: white;
      padding: 25px 20px;
      text-align: center;
    }
    
    .logo-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 25px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .logo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    
    .logo-circle {
      width: 55px;
      height: 55px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    
    .logo-label {
      font-size: 10px;
      opacity: 0.9;
    }
    
    .header h1 {
      font-size: 20px;
      margin-bottom: 8px;
    }
    
    .header p {
      font-size: 13px;
      opacity: 0.9;
    }
    
    .badge-instansi {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      margin-top: 12px;
    }
    
    .iframe-wrapper {
      padding: 0;
      background: white;
    }
    
    iframe {
      width: 100%;
      height: 800px;
      border: none;
      display: block;
    }
    
    .footer {
      background: #f8f9fa;
      padding: 15px;
      text-align: center;
      font-size: 11px;
      color: #6c757d;
      border-top: 1px solid #e9ecef;
    }
    
    @media (max-width: 768px) {
      .container { padding: 10px; }
      .logo-circle { width: 45px; height: 45px; font-size: 22px; }
      .logo-label { font-size: 8px; }
      .header h1 { font-size: 16px; }
      iframe { height: 700px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="logo-container">
          <div class="logo-item">
            <div class="logo-circle">🦅</div>
            <div class="logo-label">REPUBLIK INDONESIA</div>
          </div>
          <div class="logo-item">
            <div class="logo-circle">🤝</div>
            <div class="logo-label">KEMENTERIAN SOSIAL</div>
          </div>
          <div class="logo-item">
            <div class="logo-circle">🏠</div>
            <div class="logo-label">PKH</div>
          </div>
          <div class="logo-item">
            <div class="logo-circle">📋</div>
            <div class="logo-label">VERIFIKASI</div>
          </div>
        </div>
        <h1>✅ PROGRAM KELUARGA HARAPAN (PKH)</h1>
        <p>Verifikasi Komitmen • Lansia & Disabilitas • Kecamatan Panggul</p>
        <div class="badge-instansi">DINAS SOSIAL | KEMENTERIAN SOSIAL RI | TAHUN 2026</div>
      </div>
      
      <div class="iframe-wrapper">
        <iframe src="https://script.google.com/macros/s/AKfycbwY4W_KWquT1fwfCtWlSeSUCd0Vj05BE5LLdI-E02suE3RVNu3-hEvUdYAvXnTaGp8/exec">
          Browser Anda tidak mendukung iframe.
        </iframe>
      </div>
      
      <div class="footer">
        <p>© 2026 - Dinas Sosial Kabupaten Trenggalek | Data terekam otomatis</p>
      </div>
    </div>
  </div>
</body>
</html>
