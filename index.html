<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Verifikasi Komitmen PKH - Kecamatan Panggul</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d4715 0%, #1a6b26 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #0d4715 0%, #1a6b26 100%);
            color: white;
            padding: 24px 20px;
            text-align: center;
        }
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .logo-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .logo-circle {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .logo-label {
            font-size: 10px;
            opacity: 0.9;
        }
        .header h1 { font-size: 20px; margin-bottom: 8px; }
        .header p { font-size: 13px; opacity: 0.9; }
        .badge-instansi {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 11px;
            display: inline-block;
            margin-top: 12px;
        }
        .form-content { padding: 24px; }
        .filter-section {
            background: #f0f7f0;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a472a;
        }
        .search-container { position: relative; margin-bottom: 12px; }
        .search-wrapper { display: flex; gap: 10px; }
        .search-wrapper input {
            flex: 1;
            padding: 12px;
            border: 1px solid #c8e6d9;
            border-radius: 12px;
            font-size: 14px;
        }
        .search-wrapper button {
            background: #2d6a4f;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            cursor: pointer;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #c8e6d9;
            border-radius: 12px;
            font-size: 14px;
        }
        .komponen-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .komponen-nama { font-weight: 700; font-size: 16px; color: #1a472a; }
        .komponen-detail { font-size: 13px; color: #666; margin-top: 4px; }
        .komponen-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
        }
        .badge-lansia { background: #4caf50; color: white; }
        .badge-disabilitas { background: #ff9800; color: white; }
        .upload-area {
            border: 2px dashed #c8e6d9;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            margin-top: 12px;
            background: #fafdfa;
        }
        .file-info { margin-top: 8px; font-size: 12px; color: #2d6a4f; }
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        .loading { display: none; text-align: center; padding: 30px; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2d6a4f;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .alert-success { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        .alert-error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        .footer { background: #f5f5f5; padding: 12px; text-align: center; font-size: 11px; color: #666; }
        @media (max-width: 768px) {
            .logo-circle { width: 40px; height: 40px; font-size: 20px; }
            .header h1 { font-size: 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-container">
            <div class="logo-item"><div class="logo-circle">🦅</div><div class="logo-label">REPUBLIK INDONESIA</div></div>
            <div class="logo-item"><div class="logo-circle">🤝</div><div class="logo-label">KEMENTERIAN SOSIAL</div></div>
            <div class="logo-item"><div class="logo-circle">🏠</div><div class="logo-label">PKH</div></div>
            <div class="logo-item"><div class="logo-circle">📋</div><div class="logo-label">VERIFIKASI</div></div>
        </div>
        <h1>✅ PROGRAM KELUARGA HARAPAN (PKH)</h1>
        <p>Verifikasi Komitmen • Lansia & Disabilitas • Kecamatan Panggul</p>
        <div class="badge-instansi">DINAS SOSIAL | KEMENTERIAN SOSIAL RI | TAHUN 2026</div>
    </div>
    <div class="form-content">
        <div class="filter-section">
            <label>🔍 Pilih Keluarga Penerima Manfaat (KPM)</label>
            <div class="search-container">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="Ketik No KK atau Nama..." onkeyup="filterKK()" autocomplete="off">
                    <button onclick="resetFilter()">Reset</button>
                </div>
                <select id="selectKK" onchange="loadKomponen()">
                    <option value="">-- Pilih No KK / Nama Pengurus --</option>
                </select>
            </div>
        </div>
        <div id="komponenContainer"></div>
        <div id="loading" class="loading"><div class="spinner"></div><p>Mengupload...</p></div>
        <div id="message"></div>
        <button class="btn-submit" onclick="submitAll()" id="submitBtn" style="display: none;">💾 Simpan Semua Bukti Foto</button>
        <div class="footer"><p>© 2026 - Dinas Sosial Kabupaten Trenggalek | Data terekam otomatis</p></div>
    </div>
</div>

<script>
    // Data KK (contoh, Anda bisa tambahkan dari Google Sheets via fetch)
    let kkList = [];
    let currentKomponen = [];
    let filesToUpload = {};
    let uploadStatus = {};

    // Ganti dengan URL Web App Google Apps Script Anda (untuk menyimpan data)
    const API_URL = "https://script.google.com/macros/s/AKfycbwY4W_KWquT1fwfCtWlSeSUCd0Vj05BE5LLdI-E02suE3RVNu3-hEvUdYAvXnTaGp8/exec";

    // Load data KK dari file JSON eksternal (Anda bisa simpan data KK di file terpisah)
    async function loadKKList() {
        showMessage('Memuat data KPM...', 'warning');
        try {
            // Panggil API untuk mendapatkan daftar KK (Anda perlu menyiapkan endpoint doGet di Apps Script)
            const response = await fetch(API_URL + '?action=getListKK');
            const data = await response.json();
            kkList = data;
            populateSelectKK();
            hideMessage();
        } catch (error) {
            console.error(error);
            showMessage('Gagal memuat data. Coba lagi nanti.', 'error');
        }
    }

    function populateSelectKK() {
        const select = document.getElementById('selectKK');
        select.innerHTML = '<option value="">-- Pilih No KK / Nama Pengurus --</option>';
        for (let i = 0; i < kkList.length; i++) {
            const option = document.createElement('option');
            option.value = kkList[i].noKK;
            option.text = `${kkList[i].noKK} - ${kkList[i].namaPengurus}`;
            select.appendChild(option);
        }
    }

    function filterKK() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const select = document.getElementById('selectKK');
        select.innerHTML = '<option value="">-- Pilih No KK / Nama Pengurus --</option>';
        for (let i = 0; i < kkList.length; i++) {
            const text = `${kkList[i].noKK} - ${kkList[i].namaPengurus}`.toLowerCase();
            if (text.includes(keyword)) {
                const option = document.createElement('option');
                option.value = kkList[i].noKK;
                option.text = `${kkList[i].noKK} - ${kkList[i].namaPengurus}`;
                select.appendChild(option);
            }
        }
    }

    function resetFilter() {
        document.getElementById('searchInput').value = '';
        populateSelectKK();
        document.getElementById('komponenContainer').innerHTML = '';
        document.getElementById('submitBtn').style.display = 'none';
    }

    async function loadKomponen() {
        const noKK = document.getElementById('selectKK').value;
        if (!noKK) {
            document.getElementById('komponenContainer').innerHTML = '';
            document.getElementById('submitBtn').style.display = 'none';
            return;
        }
        showMessage('Memuat data komponen...', 'warning');
        try {
            const response = await fetch(`${API_URL}?action=getKomponen&noKK=${encodeURIComponent(noKK)}`);
            const komponen = await response.json();
            currentKomponen = komponen;
            displayKomponen(komponen, noKK);
            hideMessage();
        } catch (error) {
            showMessage('Gagal memuat komponen', 'error');
        }
    }

    function displayKomponen(komponen, noKK) {
        const container = document.getElementById('komponenContainer');
        if (komponen.length === 0) {
            container.innerHTML = '<div class="alert-warning">⚠️ Tidak ada data.</div>';
            document.getElementById('submitBtn').style.display = 'none';
            return;
        }
        let html = `<div class="info-kk"><strong>🏠 No KK:</strong> ${noKK}<br><strong>👥 Jumlah Komponen:</strong> ${komponen.length} orang</div>`;
        for (let i = 0; i < komponen.length; i++) {
            const komp = komponen[i];
            const badgeClass = komp.komponen === 'LANSIA' ? 'badge-lansia' : 'badge-disabilitas';
            const badgeText = komp.komponen === 'LANSIA' ? '👵 LANSIA' : '♿ DISABILITAS';
            html += `
                <div class="komponen-card" id="card_${i}">
                    <div class="komponen-nama">👤 ${komp.nama}</div>
                    <div class="komponen-detail">📌 NIK: ${komp.nik}</div>
                    <div class="komponen-detail">📍 ${komp.alamat || '-'} (RT ${komp.rt || '-'} / RW ${komp.rw || '-'})</div>
                    <div class="komponen-badge ${badgeClass}">${badgeText}</div>
                    <div class="upload-area" id="uploadArea_${i}" onclick="document.getElementById('fileInput_${i}').click()">📎 Klik untuk upload bukti foto</div>
                    <input type="file" id="fileInput_${i}" accept="image/*" style="display:none" onchange="handleFileSelect(event, ${i}, '${komp.nik}', '${komp.nama}', '${komp.komponen}')">
                    <div class="file-info" id="fileInfo_${i}"></div>
                </div>
            `;
        }
        container.innerHTML = html;
        document.getElementById('submitBtn').style.display = 'block';
        filesToUpload = {};
    }

    function handleFileSelect(event, index, nik, nama, komponen) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            filesToUpload[index] = {
                base64: e.target.result.split(',')[1],
                filename: file.name,
                nik: nik,
                nama: nama,
                komponen: komponen
            };
            document.getElementById(`fileInfo_${index}`).innerHTML = `📁 ${file.name} siap upload`;
            document.getElementById(`uploadArea_${index}`).classList.add('uploaded');
            document.getElementById(`uploadArea_${index}`).innerHTML = '📸 Foto siap diupload';
        };
        reader.readAsDataURL(file);
    }

    async function submitAll() {
        const loading = document.getElementById('loading');
        const submitBtn = document.getElementById('submitBtn');
        const noKK = document.getElementById('selectKK').value;
        if (!noKK) return showMessage('Pilih KK dulu', 'error');
        const pending = Object.keys(filesToUpload).length;
        if (pending === 0) return showMessage('Tidak ada file', 'error');
        loading.style.display = 'block';
        submitBtn.disabled = true;
        let uploaded = 0, errors = [];
        for (let key in filesToUpload) {
            const data = filesToUpload[key];
            try {
                const formData = new FormData();
                formData.append('action', 'uploadFoto');
                formData.append('noKK', noKK);
                formData.append('nik', data.nik);
                formData.append('nama', data.nama);
                formData.append('komponen', data.komponen);
                formData.append('filename', data.filename);
                formData.append('base64', data.base64);
                const response = await fetch(API_URL, { method: 'POST', body: formData });
                const result = await response.json();
                if (result.success) uploaded++;
                else errors.push(result.error);
            } catch(e) { errors.push(e.message); uploaded++; }
            if (uploaded === pending) {
                loading.style.display = 'none';
                submitBtn.disabled = false;
                if (errors.length === 0) {
                    showMessage('✅ Semua foto berhasil diupload!', 'success');
                    filesToUpload = {};
                    loadKomponen();
                } else showMessage(`⚠️ ${errors.length} gagal`, 'error');
            }
        }
    }

    function showMessage(msg, type) {
        const div = document.getElementById('message');
        div.innerHTML = `<div class="alert-${type}">${msg}</div>`;
        setTimeout(() => div.innerHTML = '', 5000);
    }
    function hideMessage() { document.getElementById('message').innerHTML = ''; }

    window.onload = loadKKList;
</script>
</body>
</html>
